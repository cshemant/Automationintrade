name: Update Market JSON

on:
  # Run manually from GitHub Actions whenever you want.
  workflow_dispatch:
    inputs:
      mode:
        description: "Which update should run?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - market
          - research
          - technical-analysis
          - stock-index
          - 52w
          - market-snapshot
          - fii-dii
          - index-performance
          - stock-strength
          - momentum-scanner
          - volume-surge
          - near-breakout

  # GitHub cron uses UTC time.
  # Runs Monday-Friday at 4:07 PM, 7:07 PM and 11:58 PM IST.
  schedule:
    - cron: "37 10 * * 1-5"
    - cron: "37 13 * * 1-5"
    - cron: "28 18 * * 1-5"

permissions:
  contents: write

concurrency:
  group: market-json-update
  cancel-in-progress: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one-command data update
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          echo "Running UpdateAllData.py with mode: $MODE"
          python UpdateAllData.py --mode "$MODE" --batch-size 80

      - name: Show changed data files
        run: |
          git status --short market-data stock-research-data markets/sector || true

      - name: Commit and push updated JSON
        run: |
          if [ -n "$(git status --porcelain market-data stock-research-data markets/sector)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add market-data stock-research-data markets/sector
            git commit -m "chore: auto-update market, sector and research data"
            git push
          else
            echo "No JSON changes found. Nothing to commit."
          fi
