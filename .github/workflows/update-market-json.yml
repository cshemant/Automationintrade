name: Update Market JSON

on:
  # Run manually from GitHub Actions whenever you want.
  workflow_dispatch:
    inputs:
      mode:
        description: "Which JSON set should be updated?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - 52w
          - market-snapshot
          - fii-dii
          - index-performance
          - stock-strength
          - momentum-scanner
          - volume-surge
          - near-breakout

  # GitHub cron uses UTC time.
  # 10:45 UTC = 4:15 PM IST. Runs Monday-Friday after Indian market close.
  schedule:
    - cron: "45 10 * * 1-5"

permissions:
  contents: write

concurrency:
  group: market-json-update
  cancel-in-progress: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate updated market JSON
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          MODE="${{ github.event.inputs.mode || 'all' }}"
          echo "Running GenerateMarketToolsJson.py with mode: $MODE"
          python GenerateMarketToolsJson.py --mode "$MODE"

      - name: Show changed market-data files
        run: |
          git status --short market-data || true

      - name: Commit and push updated JSON
        run: |
          if [ -n "$(git status --porcelain market-data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add market-data
            git commit -m "chore: auto-update market JSON [skip ci]"
            git push
          else
            echo "No market-data JSON changes found. Nothing to commit."
          fi
